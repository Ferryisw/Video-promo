<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Video Promo Spesial</title>
    <style>
        /* --- PENGATURAN TAMPILAN (CSS) --- */
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #0f1419; /* Warna gelap ala Twitter/X */
            color: #ffffff;
            margin: 0;
            padding: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
        }

        .video-wrapper {
            position: relative;
            width: 100%;
            max-width: 480px; /* Ukuran optimal untuk layar HP */
            background: #000;
            box-shadow: 0 10px 20px rgba(0,0,0,0.5);
            border-radius: 12px;
            overflow: hidden;
        }

        video {
            width: 100%;
            display: block;
            border-radius: 12px;
        }

        /* Desain Tombol Beli yang akan muncul belakangan */
        #actionBtn {
            display: none; /* Disembunyikan dari awal */
            position: absolute;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            background-color: #ff5722; /* Warna Oranye Shopee */
            color: white;
            text-decoration: none;
            padding: 12px 24px;
            font-size: 16px;
            font-weight: bold;
            border-radius: 30px;
            box-shadow: 0 4px 10px rgba(255, 87, 34, 0.4);
            animation: popUp 0.5s ease-out forwards;
            z-index: 10;
        }

        #actionBtn:hover {
            background-color: #e64a19;
        }

        /* Animasi agar tombol munculnya halus */
        @keyframes popUp {
            from { opacity: 0; transform: translate(-50%, 20px); }
            to { opacity: 1; transform: translate(-50%, 0); }
        }

        /* Teks arahan di bawah video */
        .footer-text {
            margin-top: 15px;
            font-size: 14px;
            color: #8899a6;
            text-align: center;
        }
    </style>
</head>
<body>

    <div class="video-wrapper">
        <video id="videoPlayer" playsinline controls preload="metadata">
            <source src="videofilm.mp4" type="video/mp4">
            Browser Anda tidak mendukung pemutaran video.
        </video>

        <a href="https://shopee.co.id/" id="actionBtn" target="_blank">🛒 Dapatkan Kahf Sekarang</a>
    </div>

    <div class="footer-text">
        <p>Pastikan volume menyala 🔊</p>
    </div>

    <script>
        /* --- LOGIKA SISTEM (JAVASCRIPT) --- */
        const video = document.getElementById("videoPlayer");
        const actionBtn = document.getElementById("actionBtn");
        
        // Ganti dengan link affiliate/produk Anda
        const linkAffiliate = "https://s.shopee.co.id/8fQMxTvoYY"; 
        let isAdTriggered = false;

        // FUNGSI 1: Memantau Waktu Putar Video
        video.addEventListener("timeupdate", () => {
            // Angka 60 berarti 60 detik. Ganti ke 5 jika ingin tes cepat di TrebEdit.
            if (video.currentTime >= 60 && !isAdTriggered) {
                isAdTriggered = true;
                
                // Munculkan tombol di atas video
                actionBtn.style.display = "block";
                
                // Buka tab baru secara otomatis
                window.open(linkAffiliate, "_blank");
            }
        });

        // FUNGSI 2: Melanjutkan Video Saat Penonton Kembali
        document.addEventListener("visibilitychange", () => {
            if (!document.hidden) {
                // Mainkan kembali video saat kembali dari Shopee
                video.play();
            } else {
                // (Opsional) Jeda otomatis video jika penonton pindah tab
                video.pause();
            }
        });
    </script>

</body>
</html>
